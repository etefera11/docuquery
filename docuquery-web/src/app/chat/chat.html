<div class="chat-container">
  <div class="messages">
    <div *ngFor="let message of messages"
         [class]="'message ' + message.role">
      <span class="role">{{ message.role === 'user' ? 'You' : 'DocuQuery' }}</span>
      <p>{{ message.content }}</p>
    </div>

    <div *ngIf="asking" class="message assistant thinking">
      <span class="role">DocuQuery</span>
      <p>Thinking...</p>
    </div>
  </div>

  <div *ngIf="error" class="error">❌ {{ error }}</div>

  <div class="input-row">
    <textarea
      [(ngModel)]="question"
      (keydown)="onKeyDown($event)"
      placeholder="Ask a question about your document..."
      rows="2"
      [disabled]="asking">
    </textarea>
    <button (click)="ask()" [disabled]="!question.trim() || asking">
      {{ asking ? '...' : 'Ask' }}
    </button>
  </div>

  <button class="clear" (click)="clearChat()">Clear chat</button>
</div>
