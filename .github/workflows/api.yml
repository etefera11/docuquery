name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'DocuQuery.Api/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and Publish
        run: dotnet publish DocuQuery.Api/DocuQuery.Api.csproj --configuration Release --output ./publish

      - name: Zip publish output
        run: cd publish && zip -r ../deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'docuquery-api'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./deploy.zip